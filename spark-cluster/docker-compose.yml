services:
  spark-master:
    build: .
    container_name: spark-master
    ports:
      - "8080:8080" # Interface Web do Spark Master
      - "7077:7077" # Porta de comunicação interna do cluster
    volumes:
      - ./scripts:/opt/spark/scripts
      - ../iceberg-warehouse:/opt/spark/iceberg-warehouse
    networks:
      - spark-network
    command: ["/bin/bash", "/opt/spark/scripts/entrypoint-master.sh"]
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G


  spark-worker:
    build: .
    container_name: spark-worker-1
    depends_on:
      - spark-master
    ports:
      - "8081:8081" # Interface Web do Spark Worker
    volumes:
      - ./scripts:/opt/spark/scripts
      - ../iceberg-warehouse:/opt/spark/iceberg-warehouse
    networks:
      - spark-network
    command: ["/bin/bash", "/opt/spark/scripts/entrypoint-worker.sh", "spark://spark-master:7077"]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G


networks:
  spark-network:
    driver: bridge
