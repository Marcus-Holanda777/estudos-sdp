spark.sql.extensions                   org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.spark_catalog        org.apache.iceberg.spark.SparkSessionCatalog
spark.sql.catalog.spark_catalog.type   hive

spark.sql.catalog.local                 org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.local.type            hadoop
spark.sql.catalog.local.warehouse       file:///opt/spark/iceberg-warehouse
spark.sql.defaultCatalog                local

# --- Limpeza Automática do Worker ---
spark.worker.cleanup.enabled         true
spark.worker.cleanup.interval        1800
spark.worker.cleanup.appDataTtl      600

# --- Performance e Recursos ---
spark.serializer                     org.apache.spark.serializer.KryoSerializer
spark.executor.memory                2g
spark.executor.cores                 1
spark.cores                          1

# --- Configurações do Spark History Server ---
spark.eventLog.enabled              true
spark.eventLog.dir                  file:///opt/spark/event-logs
spark.history.fs.logDirectory       file:///opt/spark/event-logs
spark.history.ui.port               18080
